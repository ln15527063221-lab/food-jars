    <!-- iOS 状态栏：black-translucent 让内容延伸到状态栏下方，配合深色背景显示白色文字 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="食物罐子">
    <!-- Android / PWA 状态栏颜色 -->
    <meta name="theme-color" content="#1e1b4b">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        input, select, textarea {
            font-size: 16px !important;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* 拟物金盖玻璃罐 */
        .glass-jar {
            position: relative;
            width: 220px;
            height: 270px;
            background: linear-gradient(135deg, rgba(255,255,255,0.85) 0%, rgba(255,255,255,0.45) 100%);
            border: 2px solid rgba(255, 255, 255, 0.9);
            border-radius: 55px 55px 75px 75px;
            backdrop-filter: blur(14px);
            box-shadow: inset 0 25px 40px rgba(255,255,255,0.75), 
                        inset 0 -15px 25px rgba(0,0,0,0.02),
                        0 20px 45px rgba(0,0,0,0.035);
            overflow: hidden;
        }
        .jar-gold-lid {
            width: 130px;
            height: 24px;
            background: linear-gradient(to right, #e2b76e 0%, #f7dfa7 30%, #dfb265 70%, #b88a3b 100%);
            border-radius: 10px 10px 5px 5px;
            box-shadow: 0 6px 14px rgba(184, 138, 59, 0.2), inset 0 2px 3px rgba(255,255,255,0.5);
            margin: 0 auto -2px auto;
            position: relative;
            z-index: 10;
        }
        .jar-shadow {
            width: 190px;
            height: 12px;
            background: radial-gradient(ellipse at center, rgba(0,0,0,0.035) 0%, rgba(0,0,0,0) 70%);
            margin-top: 6px;
            border-radius: 50%;
        }

                <div class="grid grid-cols-2 gap-2">

                        <label class="block text-[13px] font-semibold text-slate-400 mb-1.5">初始数量</label>
                        <div class="flex items-center bg-slate-50 border border-slate-200/60 rounded-xl overflow-hidden h-[38px]">

                            <input type="number" id="form-quantity-num" value="1" min="1" class="flex-1 bg-transparent text-center text-sm font-bold text-slate-700 focus:outline-none w-0" style="-webkit-appearance:none;-moz-appearance:textfield;">
                            <button type="button" onclick="stepQty(1)" class="w-10 h-full flex items-center justify-center text-slate-400 font-bold text-lg hover:bg-slate-200 transition-colors select-none">+</button>
                        </div>
                    </div>
                    <div id="unit-box">
                        <label class="block text-[13px] font-semibold text-slate-400 mb-1.5">单位</label>
                        <select id="form-quantity-unit" class="w-full bg-slate-50 border border-slate-200/60 rounded-xl pl-3 pr-8 py-2 text-sm focus:outline-none focus:border-indigo-500 appearance-none" style="-webkit-appearance:none;background-image:url('data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2212%22 height=%2212%22 viewBox=%220 0 12 12%22><path fill=%22%2394a3b8%22 d=%22M6 8L1 3h10z%22/></svg>');background-repeat:no-repeat;background-position:right 10px center;">
                            <option value="个">个</option>
                            <option value="盒">盒</option>
                            <option value="瓶">瓶</option>
                            <option value="袋">袋</option>
                            <option value="块">块</option>
                            <option value="包">包</option>
                            <option value="克">克</option>
                            <option value="无单位">无单位</option>
                        </select>
                    </div>
                </div>

                <div id="expiry-box">
                    <label class="block text-[13px] font-semibold text-slate-400 mb-1">到期时间</label>
                    <input type="date" id="form-expiry" class="w-full bg-slate-50 border border-slate-200/60 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-indigo-500 box-border" style="max-width:100%;-webkit-appearance:none;">
                </div>

                <div class="flex items-center gap-3 pt-4 border-t border-slate-50">
                    <button type="button" id="modal-delete-btn" onclick="handleModalDelete()" class="flex-1 border border-rose-200 bg-rose-50/60 hover:bg-rose-100/60 text-sm font-bold text-rose-500 py-3 rounded-xl transition-all">
                        删除此项
                    </button>
                    <button type="button" onclick="saveIngredient()" id="modal-submit-btn" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-bold py-3 rounded-xl shadow-md transition-all">
                        确认保存
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const defaultIngredients = [
            { id: 1, name: '鲜牛奶', emoji: '🥛', type: 'ingredient', quantity: 2, unit: '瓶', expiryDate: '2026-06-12' },
            { id: 2, name: '土鸡蛋', emoji: '🥚', type: 'ingredient', quantity: 12, unit: '个', expiryDate: '2026-06-25' },
            { id: 3, name: '战斧牛排', emoji: '🥩', type: 'ingredient', quantity: 4, unit: '块', expiryDate: '2026-09-10' },
            { id: 4, name: '生抽酱油', emoji: '🍾', type: 'condiment', quantity: 2, unit: '瓶', expiryDate: null },
            { id: 5, name: '黑胡椒粉', emoji: '🧂', type: 'condiment', quantity: 1, unit: '个', expiryDate: null }
        ];

        const defaultShoppingList = [
            { id: 101, name: '金针菇', emoji: '🍄' },
            { id: 102, name: '香蕉', emoji: '🍌' }
        ];

        const defaultConsumeHistory = [
            { name: '土鸡蛋', emoji: '🥚', count: 6 },
            { name: '鲜牛奶', emoji: '🥛', count: 4 },
            { name: '香蕉', emoji: '🍌', count: 2 },
            { name: '西红柿', emoji: '🍅', count: 2 }
        ];

        function formatLocalDate(date = new Date()) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        function parseLocalDate(dateStr) {
            if (!dateStr) return null;
            const [year, month, day] = dateStr.split('-').map(Number);
            if (!year || !month || !day) return null;
            return new Date(year, month - 1, day);
        }

        function getCurrentWeekRange() {
            const now = new Date();
            const day = now.getDay() || 7;
            const monday = new Date(now);
            monday.setDate(now.getDate() - day + 1);
            monday.setHours(0, 0, 0, 0);

            const sunday = new Date(monday);
            sunday.setDate(monday.getDate() + 6);
            sunday.setHours(23, 59, 59, 999);

            return {
                monday,
                sunday,
                mondayStr: formatLocalDate(monday),
                sundayStr: formatLocalDate(sunday)
            };
        }

        function getWeekKey() {
            return getCurrentWeekRange().mondayStr;
        }

        const savedWeekKey = localStorage.getItem('fridge_weekKey');
        const currentWeekKey = getWeekKey();
        if (savedWeekKey !== currentWeekKey) {
            localStorage.removeItem('fridge_consumeHistory');
            localStorage.setItem('fridge_weekKey', currentWeekKey);
        }

        let state = {
            activePage: 'fridge',
            activeZone: 'all',
            ingredients: JSON.parse(localStorage.getItem('fridge_ingredients')) || defaultIngredients,
            shoppingList: JSON.parse(localStorage.getItem('fridge_shoppingList')) || defaultShoppingList,
            consumeHistory: JSON.parse(localStorage.getItem('fridge_consumeHistory')) || []
        };

        function saveStateToLocalStorage() {
            localStorage.setItem('fridge_ingredients', JSON.stringify(state.ingredients));
            localStorage.setItem('fridge_shoppingList', JSON.stringify(state.shoppingList));
            localStorage.setItem('fridge_consumeHistory', JSON.stringify(state.consumeHistory));
        }

        function getCurrentWeekStats() {
            const { mondayStr, sundayStr } = getCurrentWeekRange();
            const weekMap = {};

            state.consumeHistory.forEach(historyItem => {
                let weekCount = 0;

                if (Array.isArray(historyItem.dates) && historyItem.dates.length > 0) {
                    weekCount = historyItem.dates.filter(date => (
                        date >= mondayStr && date <= sundayStr
                    )).length;
                } else {
                    // 兼容旧数据：没有 dates 字段时按原 count 统计
                    weekCount = Number(historyItem.count) || 0;
                }

                if (weekCount <= 0) return;

                if (!weekMap[historyItem.name]) {
                    weekMap[historyItem.name] = {
                        emoji: historyItem.emoji,
                        name: historyItem.name,
                        count: 0
                    };
                }
                weekMap[historyItem.name].count += weekCount;
            });

            return Object.values(weekMap).sort((a, b) => b.count - a.count);
        }

        const emojiDictionary = {
            '蛋': '🥚', '奶': '🥛', '肉': '🥩', '牛': '🥩', '鸡': '🍗', '鱼': '🐟', '酱': '🍾', '醋': '🍾', '油': '🛢️', '盐': '🧂', '椒': '🧂', '番茄': '🍅', '菜': '🥬', '米': '🌾', '菇': '🍄', '蕉': '🍌'
        };

        function autoMatchEmoji(text) {
            let matched = '📦';
            for (let key in emojiDictionary) {
                if (text.includes(key)) { matched = emojiDictionary[key]; break; }
            }
            document.getElementById('form-emoji').value = matched;
            document.getElementById('form-emoji-btn').innerText = matched;
        }

        function toggleEmojiPicker(e) {
            e.stopPropagation();
            document.getElementById('emoji-picker').classList.toggle('hidden');
        }

        function selectCustomEmoji(emoji) {
            document.getElementById('form-emoji').value = emoji;
            document.getElementById('form-emoji-btn').innerText = emoji;
            document.getElementById('emoji-picker').classList.add('hidden');
        }

        document.addEventListener('click', () => {
            document.getElementById('emoji-picker').classList.add('hidden');
        });

        function switchPage(pageId) {
            state.activePage = pageId;
            document.querySelectorAll('.page-content').forEach(p => p.classList.add('hidden'));
            document.getElementById(`page-${pageId}`).classList.remove('hidden');
            
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.replace('text-indigo-600', 'text-slate-400'));
            document.getElementById(`nav-${pageId}`).classList.replace('text-slate-400', 'text-indigo-600');
            
            const titles = { 'fridge': '食材库', 'shopping': '采购单', 'stats': '消耗录' };
            document.getElementById('app-heading-title').innerText = titles[pageId];

            const addBtn = document.getElementById('header-add-btn');
            const tabBar = document.getElementById('zone-tab-bar');
            if (pageId === 'fridge') {
                addBtn.classList.remove('hidden');
                tabBar.classList.remove('hidden');
            } else {
                addBtn.classList.add('hidden');
                tabBar.classList.add('hidden');
            }

            render();

            // 页面显示并完成布局后再播放落罐动画，尺寸与触感会更稳定
            if (pageId === 'stats') {
                requestAnimationFrame(() => triggerJarFallAnimation());
            }
        }

        function switchZone(zoneId) {
            state.activeZone = zoneId;
            document.querySelectorAll('.zone-tab').forEach(t => {
                t.className = "zone-tab px-3 py-1.5 rounded-full text-sm font-medium bg-white text-slate-500 shadow-[0_2px_4px_rgba(0,0,0,0.01)] whitespace-nowrap transition-all";
            });
            const tabEl = document.getElementById(`tab-zone-${zoneId}`);
            if (tabEl) tabEl.className = "zone-tab px-3 py-1.5 rounded-full text-sm font-semibold bg-indigo-600 text-white whitespace-nowrap transition-all";
            render();
        }

        function openModal(editId = null) {
            const modal = document.getElementById('add-modal');
            const delBtn = document.getElementById('modal-delete-btn');
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                document.getElementById('modal-panel').classList.remove('scale-95');
            }, 50);

            if (editId) {
                delBtn.classList.remove('hidden');
                document.getElementById('modal-title').innerText = "✏️ 编辑储备物品";
                const item = state.ingredients.find(i => i.id === editId);
                document.getElementById('form-id').value = item.id;
                document.getElementById('form-name').value = item.name;
                document.getElementById('form-emoji').value = item.emoji;
                document.getElementById('form-emoji-btn').innerText = item.emoji;
                
                const editType = item.type || 'ingredient';
                const radioEl = document.querySelector('input[name="form-type"][value="' + editType + '"]');
                if (radioEl) radioEl.checked = true;
                toggleTypeFields(editType);
                document.getElementById('form-quantity-num').value = item.quantity;
                document.getElementById('form-quantity-unit').value = item.unit || '无单位';
                document.getElementById('form-expiry').value = item.expiryDate || '';
            } else {
                delBtn.classList.add('hidden');
                document.getElementById('modal-title').innerText = "✨ 新增厨房储备";
                document.getElementById('form-id').value = '';
                document.getElementById('form-name').value = '';
                document.getElementById('form-emoji').value = '📦';
                document.getElementById('form-emoji-btn').innerText = '📦';
                document.getElementById('form-quantity-num').value = '1';
                document.querySelector('input[name="form-type"][value="ingredient"]').checked = true;
                toggleTypeFields('ingredient');
                
                const weekLater = new Date();
                weekLater.setDate(weekLater.getDate() + 7);
                document.getElementById('form-expiry').value = formatLocalDate(weekLater);
            }
        }

        function closeModal() {
            const modal = document.getElementById('add-modal');
            document.getElementById('modal-panel').classList.add('scale-95');
            modal.classList.add('opacity-0');
            setTimeout(() => modal.classList.add('hidden'), 200);
        }

        function toggleTypeFields(type) {
            ['ingredient','condiment','herb','breakfast'].forEach(t => {
                const el = document.getElementById('label-type-' + t);
                if (!el) return;
                if (t === type) {
                    el.className = "border border-indigo-200 bg-indigo-50/40 rounded-xl p-2.5 flex items-center justify-center gap-1.5 cursor-pointer text-indigo-700 font-bold flex-1";
                    el.querySelector('span').classList.replace('text-slate-500','text-indigo-600');
                } else {
                    el.className = "border border-slate-200 bg-white rounded-xl p-2.5 flex items-center justify-center gap-1.5 cursor-pointer text-slate-500 flex-1";
                    el.querySelector('span').classList.replace('text-indigo-600','text-slate-500');
                }
            });
            const unitBox = document.getElementById('unit-box');
            const expiryBox = document.getElementById('expiry-box');
            if (type === 'ingredient') {
                unitBox.classList.remove('invisible');
                expiryBox.classList.remove('hidden');
            } else {
                unitBox.classList.add('invisible');
                expiryBox.classList.add('hidden');
            }
        }

        function saveIngredient() {
            const id = document.getElementById('form-id').value;
            const checkedRadio = document.querySelector('input[name="form-type"]:checked');
            const type = checkedRadio ? checkedRadio.value : 'ingredient';
            const name = document.getElementById('form-name').value.trim();
            if (!name) {
                document.getElementById('form-name').focus();
                document.getElementById('form-name').style.borderColor = '#f43f5e';
                setTimeout(() => document.getElementById('form-name').style.borderColor = '', 1500);
                return;
            }
            const emoji = document.getElementById('form-emoji').value;
            const quantity = parseInt(document.getElementById('form-quantity-num').value) || 0;
            
            let unit = document.getElementById('form-quantity-unit').value;
            if (unit === '无单位' || type === 'condiment') unit = '';
            const expiryDate = (type === 'ingredient') ? document.getElementById('form-expiry').value : null;

            if (id) {
                state.ingredients = state.ingredients.map(i => i.id == id ? { ...i, name, emoji, type, quantity, unit, expiryDate } : i);
            } else {
                state.ingredients.push({ id: Date.now(), name, emoji, type, quantity, unit, expiryDate });
            }
            closeModal();
            saveStateToLocalStorage();
            render();
        }

        function handleModalDelete() {
            const id = parseInt(document.getElementById('form-id').value);
            if (id) {
                state.ingredients = state.ingredients.filter(i => i.id !== id);
                closeModal();
                saveStateToLocalStorage();
                render();
            }
        }

        function handleMinus(id, event) {
            event.stopPropagation();
            state.ingredients = state.ingredients.map(item => {
                if (item.id === id && item.quantity > 0) {
                    const newQty = item.quantity - 1;
                    
                    const existLog = state.consumeHistory.find(h => h.name === item.name);
                    const today = formatLocalDate();
                    if (existLog) { existLog.count++; if (!existLog.dates) existLog.dates = []; existLog.dates.push(today); }
                    else { state.consumeHistory.unshift({ name: item.name, emoji: item.emoji, count: 1, dates: [today] }); }
                    
                    return { ...item, quantity: newQty };
                }
                return item;
            });
            saveStateToLocalStorage();
            render();
        }

        function handlePlusOrShopping(item, event) {
            event.stopPropagation();
            if (item.quantity === 0) {
                if (!state.shoppingList.some(s => s.name === item.name)) {
                    state.shoppingList.push({ id: Date.now(), name: item.name, emoji: item.emoji, type: item.type || 'ingredient', unit: item.unit || '个' });
                }
                state.ingredients = state.ingredients.filter(i => i.id !== item.id);
            } else {
                state.ingredients = state.ingredients.map(i => i.id === item.id ? { ...i, quantity: i.quantity + 1 } : i);
            }
            saveStateToLocalStorage();
            render();
        }

        function addQuickShopping() {
            const input = document.getElementById('quick-shopping-name');
            const name = input.value.trim();
            if (!name) return;
            let matched = '🛒';
            for (let key in emojiDictionary) {
                if (name.includes(key)) { matched = emojiDictionary[key]; break; }
            }
            state.shoppingList.push({ id: Date.now(), name, emoji: matched });
            input.value = '';
            saveStateToLocalStorage();
            render();
        }

        function deleteShoppingItem(id, event) {
            if (event) event.stopPropagation();
            state.shoppingList = state.shoppingList.filter(item => item.id !== id);
            saveStateToLocalStorage();
            render();
        }

        let _boughtId = null;

        function handleBought(id, event) {
            if(event) event.stopPropagation();
            const item = state.shoppingList.find(s => s.id === id);
            if (!item) return;
            _boughtId = id;
            document.getElementById('bought-item-name').innerText = `「${item.emoji} ${item.name}」买了多少？`;
            document.getElementById('bought-qty').value = 1;
            document.getElementById('bought-expiry').value = '';
            const modal = document.getElementById('bought-modal');
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                document.getElementById('bought-panel').classList.remove('scale-95');
            }, 30);
        }

        function closeBoughtModal() {
            const modal = document.getElementById('bought-modal');
            document.getElementById('bought-panel').classList.add('scale-95');
            modal.classList.add('opacity-0');
            setTimeout(() => modal.classList.add('hidden'), 200);
        }

        function stepBoughtQty(delta) {
            const el = document.getElementById('bought-qty');
            el.value = Math.max(1, (parseInt(el.value) || 1) + delta);
        }

        function confirmBought() {
            const item = state.shoppingList.find(s => s.id === _boughtId);
            if (!item) { closeBoughtModal(); return; }
            const qty = parseInt(document.getElementById('bought-qty').value) || 1;
            const expiry = document.getElementById('bought-expiry').value || null;
            // 加入食材库：如果已有同名，增加数量；否则新增
            const existing = state.ingredients.find(i => i.name === item.name);
            if (existing) {
                existing.quantity += qty;
                if (expiry) existing.expiryDate = expiry;
            } else {
                state.ingredients.push({
                    id: Date.now(), name: item.name, emoji: item.emoji,
                    type: item.type || 'ingredient', quantity: qty, unit: item.unit || '个', expiryDate: expiry
                });
            }
            state.shoppingList = state.shoppingList.filter(s => s.id !== _boughtId);
            _boughtId = null;
            saveStateToLocalStorage();
            closeBoughtModal();
            render();
        }

        let jarAnimationFrame = null;
        let jarAnimationToken = 0;
        let jarHapticDone = false;

        function stopJarAnimation() {
            jarAnimationToken += 1;
            if (jarAnimationFrame) {
                cancelAnimationFrame(jarAnimationFrame);
                jarAnimationFrame = null;
            }
        }

        function getJarItems() {
            const weeklyStats = getCurrentWeekStats();
            if (weeklyStats.length === 0) return [];

            const maxTotal = 20;
            const maxPerFood = 6;
            const buckets = weeklyStats.map(item => ({
                emoji: item.emoji,
                remaining: Math.min(item.count, maxPerFood)
            }));
            const items = [];

            // 轮流取不同食物，避免某一种食物把整个罐子占满
            while (
                items.length < maxTotal
                && buckets.some(bucket => bucket.remaining > 0)
            ) {
                buckets.forEach(bucket => {
                    if (items.length >= maxTotal || bucket.remaining <= 0) return;
                    items.push({ emoji: bucket.emoji });
                    bucket.remaining -= 1;
                });
            }

            return items.sort(() => Math.random() - 0.5);
        }

        function createInitialJarParticles(jar, items, jarW) {
            const radius = 13.2;
            const gapX = 28.5;
            const gapY = 27.5;
            const columns = Math.min(5, Math.max(3, Math.ceil(Math.sqrt(items.length))));
            const rows = Math.ceil(items.length / columns);
            const startY = Math.max(64, 112 - rows * 8);
            const particles = [];

            items.forEach((item, index) => {
                const row = Math.floor(index / columns);
                const countInRow = Math.min(columns, items.length - row * columns);
                const col = index % columns;
                const rowWidth = (countInRow - 1) * gapX;
                const x = jarW / 2 - rowWidth / 2 + col * gapX + (Math.random() * 2.4 - 1.2);
                const y = startY + row * gapY + (Math.random() * 2.4 - 1.2);

                const el = document.createElement('div');
                el.className = 'fall-emoji';
                el.textContent = item.emoji;
                jar.appendChild(el);

                particles.push({
                    el,
                    x,
                    y,
                    vx: Math.random() * 0.8 - 0.4,
                    vy: Math.random() * 0.35,
                    angle: Math.random() * 0.24 - 0.12,
                    va: Math.random() * 0.024 - 0.012,
                    rotationDistance: 0,
                    maxRotation: Math.PI * 2 * (0.75 + Math.random() * 0.65),
                    radius,
                    grounded: false
                });
            });

            return particles;
        }

        function jarHorizontalBounds(y, radius, jarW, jarH) {
            const center = jarW / 2;
            const lowerStart = jarH * 0.70;
            const lowerSpan = jarH * 0.25;
            const t = Math.max(0, Math.min(1, (y - lowerStart) / lowerSpan));
            const curvedInset = 23 * t * t;
            const left = 7 + radius + curvedInset;
            const right = jarW - 7 - radius - curvedInset;
            return { left, right, center };
        }

        function jarFloorY(x, radius, jarW, jarH) {
            const center = jarW / 2;
            const usableHalf = Math.max(1, jarW / 2 - radius - 10);
            const n = Math.min(1, Math.abs(x - center) / usableHalf);
            return jarH - 12 - radius - 40 * Math.pow(n, 3.4);
        }

        function resolveJarWalls(p, jarW, jarH, dampingBoost) {
            const bounds = jarHorizontalBounds(p.y, p.radius, jarW, jarH);

            if (p.x < bounds.left) {
                p.x = bounds.left;
                if (p.vx < 0) p.vx = -p.vx * 0.34;
                p.va += Math.abs(p.vx) * 0.004;
            } else if (p.x > bounds.right) {
                p.x = bounds.right;
                if (p.vx > 0) p.vx = -p.vx * 0.34;
                p.va -= Math.abs(p.vx) * 0.004;
            }

            const floor = jarFloorY(p.x, p.radius, jarW, jarH);
            if (p.y > floor) {
                const impactSpeed = p.vy;
                p.y = floor;

                if (p.vy > 0) {
                    p.vy = -p.vy * 0.22;
                    p.vx *= 0.965 - dampingBoost;
                    p.va += p.vx * 0.0045;

                    if (!jarHapticDone && impactSpeed > 3.7) {
                        jarHapticDone = true;
                        if (
                            typeof navigator.vibrate === 'function'
                            && !(window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches)
                        ) {
                            navigator.vibrate(8);
                        }
                    }
                }

                if (Math.abs(p.vy) < 0.28) {
                    p.vy = 0;
                    p.grounded = true;
                }
            } else {
                p.grounded = false;
            }
        }

        function resolveParticleCollision(a, b, dampingBoost) {
            const dx = b.x - a.x;
            const dy = b.y - a.y;
            const minDist = (a.radius + b.radius) * 0.94;
            const distSq = dx * dx + dy * dy;

            if (distSq <= 0 || distSq >= minDist * minDist) return;

            const dist = Math.sqrt(distSq);
            const nx = dx / dist;
            const ny = dy / dist;
            const overlap = minDist - dist;

            a.x -= nx * overlap * 0.5;
            a.y -= ny * overlap * 0.5;
            b.x += nx * overlap * 0.5;
            b.y += ny * overlap * 0.5;

            const rvx = b.vx - a.vx;
            const rvy = b.vy - a.vy;
            const normalVelocity = rvx * nx + rvy * ny;

            if (normalVelocity < 0) {
                const restitution = 0.30;
                const impulse = -(1 + restitution) * normalVelocity * 0.5;
                a.vx -= impulse * nx;
                a.vy -= impulse * ny;
                b.vx += impulse * nx;
                b.vy += impulse * ny;

                const tx = -ny;
                const ty = nx;
                const tangentVelocity = rvx * tx + rvy * ty;
                const frictionImpulse = Math.max(
                    -0.18,
                    Math.min(0.18, tangentVelocity * 0.075)
                );

                a.vx += frictionImpulse * tx;
                a.vy += frictionImpulse * ty;
                b.vx -= frictionImpulse * tx;
                b.vy -= frictionImpulse * ty;

                a.va -= tangentVelocity * (0.0014 + dampingBoost * 0.008);
                b.va += tangentVelocity * (0.0014 + dampingBoost * 0.008);
            }
        }

        function drawJarParticles(particles) {
            particles.forEach(p => {
                p.el.style.transform =
                    `translate3d(${(p.x - 14).toFixed(2)}px, ${(p.y - 14).toFixed(2)}px, 0) `
                    + `rotate(${p.angle.toFixed(4)}rad)`;
            });
        }

        function settleJarParticles(particles, jarW, jarH) {
            particles.forEach(p => {
                p.vx = 0;
                p.vy = 0;
                p.va = 0;
                p.rotationDistance = p.maxRotation;
                p.grounded = true;
                resolveJarWalls(p, jarW, jarH, 0.04);
            });

            // 最后再做几轮静态排斥，避免停止时图标互相穿插
            for (let pass = 0; pass < 8; pass++) {
                for (let i = 0; i < particles.length; i++) {
                    for (let j = i + 1; j < particles.length; j++) {
                        resolveParticleCollision(particles[i], particles[j], 0.04);
                    }
                }
                particles.forEach(p => resolveJarWalls(p, jarW, jarH, 0.04));
            }

            drawJarParticles(particles);
        }

        function renderReducedMotionJar(jar, items, jarW, jarH) {
            const particles = createInitialJarParticles(jar, items, jarW);
            const columns = Math.min(6, Math.max(3, Math.ceil(Math.sqrt(items.length))));
            const gapX = 28;
            const gapY = 27;

            particles.forEach((p, index) => {
                const row = Math.floor(index / columns);
                const countInRow = Math.min(columns, items.length - row * columns);
                const col = index % columns;
                const rowWidth = (countInRow - 1) * gapX;
                p.x = jarW / 2 - rowWidth / 2 + col * gapX;
                p.y = jarH - 31 - row * gapY;
                p.angle = (index % 2 ? 1 : -1) * 0.12;
            });

            drawJarParticles(particles);
        }

        function triggerJarFallAnimation() {
            const jar = document.getElementById('jar-body');
            if (!jar) return;

            stopJarAnimation();
            jar.innerHTML = '';
            jarHapticDone = false;

            const token = jarAnimationToken;
            const jarW = jar.offsetWidth || 220;
            const jarH = jar.offsetHeight || 270;
            const items = getJarItems();

            if (items.length === 0) {
                jar.innerHTML = '';
                return;
            }

            if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
                renderReducedMotionJar(jar, items, jarW, jarH);
                return;
            }

            const particles = createInitialJarParticles(jar, items, jarW);
            drawJarParticles(particles);

            // 参考视频节奏：
            // 约 0.5 秒完成主要下落，之后继续碰撞、滚动，约 4 秒自然停稳。
            const fixedStep = 1000 / 60;
            const gravity = 0.30;
            const maxDuration = 4200;
            let startTime = null;
            let previousTime = null;
            let accumulator = 0;

            function physicsStep(elapsed) {
                const dampingBoost = elapsed > 3000
                    ? Math.min(0.035, (elapsed - 3000) / 36000)
                    : 0;

                particles.forEach(p => {
                    p.vy += gravity;
                    p.x += p.vx;
                    p.y += p.vy;
                    const remainingRotation = Math.max(0, p.maxRotation - p.rotationDistance);
                    if (remainingRotation > 0 && Math.abs(p.va) > 0.00015) {
                        const angularStep = Math.sign(p.va) * Math.min(Math.abs(p.va), remainingRotation);
                        p.angle += angularStep;
                        p.rotationDistance += Math.abs(angularStep);
                    } else {
                        p.va = 0;
                    }

                    p.vx *= p.grounded ? (0.984 - dampingBoost) : 0.998;
                    p.vy *= 0.999;
                    p.va *= p.grounded
                        ? Math.max(0.88, 0.945 - dampingBoost * 1.6)
                        : 0.985;

                    // 旋转总量控制在约 1 圈左右，少数图标最多接近 1.5 圈
                    if (p.rotationDistance >= p.maxRotation) {
                        p.va = 0;
                    }
                });

                // 碰撞解算多做两轮，密集堆叠时会更接近视频里的自然滚动
                for (let pass = 0; pass < 2; pass++) {
                    for (let i = 0; i < particles.length; i++) {
                        for (let j = i + 1; j < particles.length; j++) {
                            resolveParticleCollision(particles[i], particles[j], dampingBoost);
                        }
                    }
                    particles.forEach(p => resolveJarWalls(p, jarW, jarH, dampingBoost));
                }
            }

            function frame(now) {
                if (token !== jarAnimationToken) return;

                if (startTime === null) {
                    startTime = now;
                    previousTime = now;
                }

                const elapsed = now - startTime;
                const delta = Math.min(50, now - previousTime);
                previousTime = now;
                accumulator += delta;

                while (accumulator >= fixedStep) {
                    physicsStep(elapsed);
                    accumulator -= fixedStep;
                }

                drawJarParticles(particles);

                if (elapsed < maxDuration) {
                    jarAnimationFrame = requestAnimationFrame(frame);
                } else {
                    settleJarParticles(particles, jarW, jarH);
                    jarAnimationFrame = null;
                }
            }

            jarAnimationFrame = requestAnimationFrame(frame);
        }

        let touchStartX = 0;
        let isMovingGesture = false; 

        function bindSwipeAndDragEvents(rowEl, id, isFridgePage = true) {
            const contentEl = rowEl.querySelector('.swipe-content');
            if(!contentEl) return;
            
            rowEl.addEventListener('touchstart', (e) => {
                touchStartX = e.touches[0].clientX;
                isMovingGesture = false; 
            }, {passive: true});

            rowEl.addEventListener('touchmove', (e) => {
                let moveX = e.touches[0].clientX - touchStartX;
                if (Math.abs(moveX) > 8) isMovingGesture = true;

                if (moveX < -8) { 
                    contentEl.style.transform = `translateX(${Math.max(-80, moveX)}px)`;
                } else if (moveX > 8) { 
                    contentEl.style.transform = 'translateX(0px)';
                }
            }, {passive: true});

            rowEl.addEventListener('touchend', (e) => {
                let finalMoveX = e.changedTouches[0].clientX - touchStartX;
                if (finalMoveX < -40) { contentEl.style.transform = 'translateX(-80px)'; } 
                else { contentEl.style.transform = 'translateX(0px)'; }
                setTimeout(() => { if(finalMoveX === 0) isMovingGesture = false; }, 30);
            }, {passive: true});

            if (isFridgePage) {
                rowEl.addEventListener('dragstart', () => rowEl.classList.add('dragging'));
                rowEl.addEventListener('dragend', () => {
                    rowEl.classList.remove('dragging');
                    reorderStateIngredients();
                });
            }
        }

        const initDragContainer = (containerId = 'ingredients-container') => {
            const container = document.getElementById(containerId);
            if(!container) return;
            container.addEventListener('dragover', (e) => {
                e.preventDefault();
                const draggingItem = document.querySelector('.dragging');
                if(!draggingItem) return;
                const siblings = [...container.querySelectorAll('.swipe-container:not(.dragging)')];
                let nextSibling = siblings.find(sibling => {
                    return e.clientY <= sibling.getBoundingClientRect().top + sibling.getBoundingClientRect().height / 2;
                });
                container.insertBefore(draggingItem, nextSibling);
            });
        };

        function reorderShoppingList() {
            const container = document.getElementById('shopping-container');
            if (!container) return;
            const currentIds = [...container.querySelectorAll('.swipe-container')].map(el => parseInt(el.getAttribute('data-id')));
            const newList = [];
            currentIds.forEach(id => {
                const found = state.shoppingList.find(i => i.id === id);
                if (found) newList.push(found);
            });
            state.shoppingList = newList;
            saveStateToLocalStorage();
        }

        function reorderStateIngredients() {
            const currentIds = [
                ...document.querySelectorAll('#ingredients-container .swipe-container')
            ].map(el => Number(el.getAttribute('data-id')));

            if (currentIds.length < 2) return;

            const reorderedVisibleItems = currentIds
                .map(id => state.ingredients.find(item => item.id === id))
                .filter(Boolean);

            const visibleIdSet = new Set(currentIds);
            let visibleIndex = 0;

            // 只替换当前分类中可见项目的位置，其他分类保持原样
            state.ingredients = state.ingredients.map(item => {
                if (!visibleIdSet.has(item.id)) return item;
                return reorderedVisibleItems[visibleIndex++] || item;
            });

            saveStateToLocalStorage();
        }

        function calculateDaysLeft(dateStr) {
            const targetDate = parseLocalDate(dateStr);
            if (!targetDate) return null;

            const today = new Date();
            today.setHours(0, 0, 0, 0);
            targetDate.setHours(0, 0, 0, 0);

            return Math.round((targetDate - today) / 86400000);
        }

        function stepQty(delta) {
            const el = document.getElementById('form-quantity-num');
            const val = Math.max(1, (parseInt(el.value) || 1) + delta);
            el.value = val;
        }

        function render() {
            const bShopping = document.getElementById('badge-shopping');
            if (state.shoppingList.length > 0) {
                bShopping.innerText = state.shoppingList.length; bShopping.classList.remove('scale-0');
            } else { bShopping.classList.add('scale-0'); }
            document.getElementById('shopping-count').innerText = state.shoppingList.length;

            // 过期角标：有食材3天内过期或已过期则显示
            const bExpiry = document.getElementById('badge-expiry');
            const hasUrgent = state.ingredients.some(i => {
                if (i.type !== 'ingredient') return false;
                const d = calculateDaysLeft(i.expiryDate);
                return d !== null && d <= 3;
            });
            if (hasUrgent) bExpiry.classList.remove('scale-0');
            else bExpiry.classList.add('scale-0');

            if (state.activePage === 'fridge') {
                const container = document.getElementById('ingredients-container');
                container.innerHTML = '';

                let filtered = state.ingredients;
                if (state.activeZone !== 'all') {
                    filtered = state.ingredients.filter(i => i.type === state.activeZone);
                }
                // 过期排序：已过期 → 快过期(≤3天) → 正常 → 调料/药材/早餐
                filtered = [...filtered].sort((a, b) => {
                    const priority = (item) => {
                        if (['condiment','herb','breakfast'].includes(item.type)) return 3;
                        const d = calculateDaysLeft(item.expiryDate);
                        if (d <= 0) return 0;
                        if (d <= 3) return 1;
                        return 2;
                    };
                    const pa = priority(a), pb = priority(b);
                    if (pa !== pb) return pa - pb;
                    // 同优先级按剩余天数升序
                    const da = calculateDaysLeft(a.expiryDate) ?? 9999;
                    const db = calculateDaysLeft(b.expiryDate) ?? 9999;
                    return da - db;
                });

                if (filtered.length === 0) {
                    container.innerHTML = `<div class="text-center py-10 text-slate-400">
  <div class="text-6xl mb-4 opacity-60">🫙</div>
  <p class="text-[14px] font-medium text-slate-400">这里还空着</p>
  <p class="text-[13px] text-slate-300 mt-1">点右上角 + 添加第一个储备</p>
</div>`;
                    return;
                }

                // 不分离过期，全部混排（过期食材卡片上已有红色标签提示）
                const normalItems = filtered;
                const expiredItems = [];

                const renderCard = (item) => {
                    let colorClass = "bg-emerald-500";
                    let textAlert = `剩 ${calculateDaysLeft(item.expiryDate)} 天`;
                    
                    const typeLabels = { condiment: '厨房调料', herb: '养生药材', breakfast: '早餐食材' };
                    if (item.type === 'ingredient') {
                        const days = calculateDaysLeft(item.expiryDate);
                        if (days <= 0) { colorClass = "bg-rose-500"; textAlert = "已过期"; }
                        else if (days <= 3) { colorClass = "bg-amber-500"; textAlert = `${days}天内过期`; }
                    } else if (typeLabels[item.type]) {
                        colorClass = "bg-indigo-400"; textAlert = typeLabels[item.type];
                    }

                    const wrap = document.createElement('div');
                    wrap.className = "swipe-container";
                    wrap.setAttribute('draggable', 'true');
                    wrap.setAttribute('data-id', item.id);
                    
                    wrap.innerHTML = `
                        <div class="swipe-back flex items-center justify-center bg-rose-500">
                            <button onclick="event.stopPropagation(); state.ingredients = state.ingredients.filter(i=>i.id!==${item.id}); saveStateToLocalStorage(); render();" class="w-full h-full text-white text-[14px] font-bold rounded-2xl">删除</button>
                        </div>
                        <div class="swipe-content bg-white shadow-[0_10px_20px_rgba(0,0,0,0.025),0_3px_8px_rgba(0,0,0,0.015)] flex justify-between items-center transition-transform cursor-grab active:cursor-grabbing border-0">
                            <div class="flex items-center gap-3 p-4 flex-1" id="touch-target-${item.id}">
                                <div class="emoji-wrapper text-2xl select-none w-8 h-8 flex items-center justify-center">${item.emoji}</div>
                                <div class="flex flex-col justify-center">
                                    <h4 class="text-base font-bold text-slate-800 leading-none">${item.name}</h4>
                                    <div class="flex items-center gap-1.5 mt-1.5">
                                        <span class="w-1.5 h-1.5 rounded-full ${colorClass}"></span>
                                        <span class="text-[12px] text-slate-400 font-medium leading-none">${textAlert}</span>
                                    </div>
                                </div>
                            </div>
                            <div class="flex items-center gap-2 pr-4 pl-2">
                                <div class="flex items-center bg-slate-50 border border-slate-200/40 rounded-xl p-0.5">
                                    <button onclick="handleMinus(${item.id}, event)" class="w-7 h-7 flex items-center justify-center text-slate-400 font-bold hover:bg-slate-200 rounded-lg text-sm select-none">-</button>
                                    <span class="px-2 text-sm font-bold text-slate-700 min-w-[32px] text-center ${item.quantity === 0 ? 'text-indigo-600 font-extrabold' : ''}">
                                        ${item.quantity}${item.unit}
                                    </span>
                                    <button onclick="handlePlusOrShopping(${JSON.stringify(item).replace(/"/g, '&quot;')}, event)" 
                                            class="w-7 h-7 flex items-center justify-center font-bold hover:bg-slate-200 rounded-lg text-base select-none ${item.quantity === 0 ? 'text-indigo-600 text-base' : 'text-slate-400'}">
                                        ${item.quantity === 0 ? '🛒' : '+'}
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;
                    container.appendChild(wrap);
                    bindSwipeAndDragEvents(wrap, item.id, true);
                    document.getElementById(`touch-target-${item.id}`).addEventListener('click', (ev) => {
                        if (!isMovingGesture) openModal(item.id);
                    });
                };

                // 渲染正常食材
                normalItems.forEach(item => renderCard(item));



                initDragContainer();
            }

            if (state.activePage === 'shopping') {
                const container = document.getElementById('shopping-container');
                container.innerHTML = '';
                if (state.shoppingList.length === 0) {
                    container.innerHTML = `<div class="text-center py-10 text-slate-400">
  <div class="text-6xl mb-4 opacity-60">🛒</div>
  <p class="text-[14px] font-medium text-slate-400">采购单是空的</p>
  <p class="text-[13px] text-slate-300 mt-1">所有物品都已备齐，太棒了！</p>
</div>`;
                    return;
                }
                state.shoppingList.forEach(item => {
                    const wrap = document.createElement('div');
                    wrap.className = "swipe-container";
                    wrap.setAttribute('draggable', 'true');
                    wrap.setAttribute('data-id', item.id);
                    wrap.innerHTML = `
                        <div class="swipe-back flex items-center justify-center bg-rose-500">
                            <button onclick="deleteShoppingItem(${item.id}, event);" class="w-full h-full text-white text-[14px] font-bold rounded-2xl">删除</button>
                        </div>
                        <div class="swipe-content bg-white p-4 shadow-[0_10px_20px_rgba(0,0,0,0.025)] flex justify-between items-center border-0">
                            <div class="flex items-center gap-3">
                                <div class="emoji-wrapper text-xl w-6 h-6 flex items-center justify-center">${item.emoji}</div>
                                <span class="text-m font-bold text-slate-800">${item.name}</span>
                            </div>
                            <button onclick="handleBought(${item.id}, event)" class="bg-indigo-50 hover:bg-indigo-100 text-indigo-600 text-sm font-bold px-3 py-1.5 rounded-lg z-10">
                                ✓ 已买到
                            </button>
                        </div>
                    `;
                    container.appendChild(wrap);
                    bindSwipeAndDragEvents(wrap, item.id, false);
                    wrap.addEventListener('dragstart', () => wrap.classList.add('dragging'));
                    wrap.addEventListener('dragend', () => {
                        wrap.classList.remove('dragging');
                        reorderShoppingList();
                    });
                });
                initDragContainer('shopping-container');
            }

            if (state.activePage === 'stats') {
                // 更新本周标签
                const wLabel = document.getElementById('stats-week-label');
                if (wLabel) {
                    const d = new Date(); const day = d.getDay() || 7;
                    const mon = new Date(d); mon.setDate(d.getDate() - day + 1);
                    const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
                    const fmt = d => `${d.getMonth()+1}/${d.getDate()}`;
                    wLabel.innerText = `本周 ${fmt(mon)} – ${fmt(sun)}`;
                }
                const weeklyStats = getCurrentWeekStats();
                const sortedTop = weeklyStats.slice(0, 10);
                const totalConsumeCount = weeklyStats.reduce((sum, item) => sum + item.count, 0);
                const foodTypeCount = weeklyStats.length;

                const summaryMain = document.getElementById('stats-summary-main');
                if (summaryMain) {
                    summaryMain.innerText = `共消耗 ${totalConsumeCount} 次 · ${foodTypeCount} 种食物`;
                }

                const topContainer = document.getElementById('stats-top-container');
                topContainer.innerHTML = '';
                
                if (sortedTop.length === 0) {
                    topContainer.innerHTML = `<div class="text-center py-8 text-slate-400">
  <div class="text-6xl mb-4 opacity-50">🍽️</div>
  <p class="text-[14px] font-medium text-slate-400">本周还没有消耗记录</p>
  <p class="text-[13px] text-slate-300 mt-1">减少食材数量时会自动记录</p>
</div>`;
                } else {
                    const medals = ['🥇','🥈','🥉'];
                    sortedTop.forEach((item, index) => {
                        const percent = Math.min(100, (item.count / sortedTop[0].count) * 100);
                        const bar = document.createElement('div');
                        bar.className = "space-y-1.5 mb-4 last:mb-0";
                        const rankLabel = index < 3 ? `<span class="text-lg">${medals[index]}</span>` : `<span class="text-[13px] font-bold text-slate-400 w-6 text-center">${index+1}</span>`;
                        bar.innerHTML = `
                          <div class="flex justify-between items-center"> <span class="flex items-center gap-1.5 font-bold text-slate-800"> ${rankLabel} <span class="text-xl w-6 h-6 flex items-center justify-center">${item.emoji}</span> <span class="text-[15px] font-bold">${item.name}</span> </span> <span class="text-slate-400 font-medium text-[13px]">消耗 ${item.count} 次</span> </div> <div class="w-full bg-slate-100 h-2 rounded-full overflow-hidden"> <div class="h-full rounded-full transition-all duration-500" style="width: ${percent}%; background: linear-gradient(90deg, #6366f1 0%, #a855f7 100%);"></div> </div>
                        `;
                        topContainer.appendChild(bar);
                    });
                }
            }
        }

        render();
    </script>
</body>
